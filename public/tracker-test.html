<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tracker test page</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f6f7f9;
            color: #182029;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(680px, calc(100vw - 32px));
            border: 1px solid #d9dee5;
            border-radius: 8px;
            background: #fff;
            padding: 28px;
            box-shadow: 0 14px 40px rgba(15, 23, 42, .08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 24px;
        }

        p {
            margin: 0 0 12px;
            color: #667085;
            line-height: 1.55;
        }

        code {
            display: block;
            overflow-wrap: anywhere;
            border-radius: 8px;
            background: #111827;
            color: #e5e7eb;
            padding: 14px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Tracker test page</h1>
        <p>Открой DevTools -> Network и найди запрос <strong>POST /api/visits</strong>. После обновления этой страницы счетчик должен отправить событие визита.</p>
        <code>&lt;script async src="http://127.0.0.1:8877/tracker.js"&gt;&lt;/script&gt;</code>
    </main>

    <script async src="http://127.0.0.1:8877/tracker.js"></script>
</body>
</html>
