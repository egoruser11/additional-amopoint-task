openapi: 3.1.0
info:
  title: Amopoint Page Visit Counter API
  version: 1.0.0
  description: Backend API for collecting page visits and viewing protected statistics.
servers:
  - url: http://localhost:8877
tags:
  - name: Tracker
  - name: Auth
  - name: Statistics
paths:
  /tracker.js:
    get:
      tags: [Tracker]
      summary: Browser tracker script
      responses:
        "200":
          description: JavaScript tracker that posts visits to the API.
          content:
            application/javascript:
              schema:
                type: string
  /api/visits:
    post:
      tags: [Tracker]
      summary: Store a page visit
      description: Public endpoint used by the browser tracker. The server reads the client IP from the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisitStoreRequest"
      responses:
        "201":
          description: Visit accepted.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [id, accepted]
                    properties:
                      id:
                        type: integer
                        example: 1
                      accepted:
                        type: boolean
                        example: true
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Issue a Sanctum API token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: set-via-admin-password-env
                device_name:
                  type: string
                  maxLength: 120
                  example: dashboard
      responses:
        "200":
          description: Token issued.
          content:
            application/json:
              schema:
                type: object
                required: [token_type, access_token, user]
                properties:
                  token_type:
                    type: string
                    example: Bearer
                  access_token:
                    type: string
                  expires_at:
                    type: string
                    nullable: true
                    format: date-time
                  user:
                    $ref: "#/components/schemas/User"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current Sanctum token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token revoked.
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Token revoked.
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/statistics/summary:
    get:
      tags: [Statistics]
      summary: Summary for charts
      description: Protected data for an hourly unique-visits chart and a city pie chart.
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          example: "2026-05-19T00:00:00+03:00"
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          example: "2026-05-20T23:59:59+03:00"
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 1
        - name: timezone
          in: query
          schema:
            type: string
            default: UTC
          example: Europe/Moscow
        - name: device_type
          in: query
          schema:
            type: string
            enum: [desktop, mobile, tablet, bot, unknown]
      responses:
        "200":
          description: Aggregated statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatisticsSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The token does not have the statistics ability.
        "422":
          $ref: "#/components/responses/ValidationError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
    TooManyRequests:
      description: Rate limit exceeded.
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema:
            type: object
            required: [message, errors]
            properties:
              message:
                type: string
              errors:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
  schemas:
    User:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Admin
        email:
          type: string
          format: email
          example: admin@example.com
    VisitStoreRequest:
      type: object
      properties:
        visitor_id:
          type: string
          maxLength: 128
          description: Client-side stable UUID. Stored only as a server-side HMAC hash.
          example: 8c15f72c-a1aa-4ab5-b8b1-31f62f50edc7
        site_host:
          type: string
          nullable: true
          maxLength: 255
          example: example.test
        page_title:
          type: string
          nullable: true
          maxLength: 255
          example: Pricing
        page_url:
          type: string
          format: uri
          maxLength: 2048
          example: https://example.test/page
        referrer:
          type: string
          nullable: true
          format: uri
          maxLength: 2048
          example: https://example.test/
        city:
          type: string
          nullable: true
          maxLength: 120
          description: Optional fallback. The backend prefers GeoIP lookup by request IP when a local database is configured.
          example: Moscow
        country:
          type: string
          nullable: true
          minLength: 2
          maxLength: 2
          example: RU
        device_type:
          type: string
          enum: [desktop, mobile, tablet, bot, unknown]
          example: desktop
        browser:
          type: string
          nullable: true
          maxLength: 120
          example: Mozilla/5.0
        platform:
          type: string
          nullable: true
          maxLength: 120
          example: MacIntel
        screen_width:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10000
          example: 1440
        screen_height:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10000
          example: 900
        language:
          type: string
          nullable: true
          maxLength: 20
          example: ru-RU
        timezone:
          type: string
          nullable: true
          maxLength: 80
          example: Europe/Moscow
    StatisticsSummaryResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [period, totals, hourly, cities]
          properties:
            period:
              type: object
              properties:
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
                timezone:
                  type: string
            totals:
              type: object
              properties:
                page_views:
                  type: integer
                unique_visitors:
                  type: integer
                cities:
                  type: integer
            hourly:
              type: array
              items:
                type: object
                properties:
                  hour:
                    type: string
                    format: date-time
                  unique_visits:
                    type: integer
                  page_views:
                    type: integer
            cities:
              type: array
              items:
                type: object
                properties:
                  city:
                    type: string
                  page_views:
                    type: integer
                  unique_visits:
                    type: integer
                  percentage:
                    type: number
                    format: float
