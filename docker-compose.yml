name: amopoint-counter

services:
    app:
        image: amopoint-counter-php:local
        build:
            context: .
            dockerfile: ./docker/app/Dockerfile
        env_file:
            - .env
        environment:
            APP_URL: http://localhost:8877
            DB_CONNECTION: sqlite
            DB_DATABASE: /var/www/storage/database/database.sqlite
            QUEUE_CONNECTION: sync
        volumes:
            - ./:/var/www
            - app-database:/var/www/storage/database
        command: >
            sh -c "mkdir -p /var/www/storage/database
            && touch /var/www/storage/database/database.sqlite
            && chown -R www-data:www-data /var/www/storage/database
            && php-fpm"
        expose:
            - "9000"
        container_name: amopoint-counter-app

    nginx:
        image: nginx:1.29-alpine
        volumes:
            - ./:/var/www:ro
            - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
        ports:
            - "8877:80"
        depends_on:
            - app
        container_name: amopoint-counter-nginx

    swagger:
        image: swaggerapi/swagger-ui:v5.29.0
        ports:
            - "8088:8080"
        volumes:
            - ./docs/openapi.yaml:/openapi.yaml
        environment:
            SWAGGER_JSON: /openapi.yaml
        depends_on:
            - nginx
        container_name: amopoint-counter-swagger

volumes:
    app-database:
